<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout</title>
<style>
html, body {
  margin: 0;
  height: 100%;
}

.container {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.bar {
  width: 100px;
  background-image: url("enbh.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
}

.center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.core {
  width: 40vmin;
  height: 40vmin;
  background: white;
}
</style>
</head>
<body>
<div class="container">
  <div class="bar"></div>
  <div class="center">
    <div class="core"></div>
  </div>
  <div class="bar"></div>
</div>
</body>
</html>
